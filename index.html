    <style>

        :root { --primary: #4A90E2; --danger: #e74c3c; --bg: #F4F7F6; --border: #E0E0E0; --green: #03C75A; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; }
        .left-panel { width: 400px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        .btn-copy { background: var(--green); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .menu-slot { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .menu-slot span { width: 50px; font-weight: 700; color: var(--primary); }
        .menu-slot select { flex: 1; padding: 5px; border-radius: 4px; border: 1px solid var(--border); }
        .voting-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; }
        .voting-table th { background: #f9f9f9; }
        .vote-count { color: var(--danger); font-weight: 700; display: block; }
        .right-panel { flex: 1; }
        #map { width: 100%; height: 100%; }
        .home-marker { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 20px; font-weight: 700; font-size: 12px; border: 2px solid #c0392b; }
        .custom-marker { background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 3px 8px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

            <table class="voting-table">

</div>

    let map;
    window.onload = function() {
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        rests.forEach(r => sels.forEach(s => s.add(new Option(`[${r.cat}] ${r.name}`, r.name))));
        
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        new naver.maps.Marker({ position: new naver.maps.LatLng(37.476742, 126.889731), map: map, icon: { content: '<div class="home-marker">🚩 아스크타워</div>', anchor: new naver.maps.Point(50, 15) } });
        rests.forEach(r => new naver.maps.Marker({ position: new naver.maps.LatLng(r.lat, r.lng), map: map, icon: { content: `<div class="custom-marker">${r.name}</div>`, anchor: new naver.maps.Point(40, 15) } }));

        db.ref('lunch_vote').on('value', snap => {
            const data = snap.val() || {};
            for(let i=1; i<=3; i++) {
                const val = data['menu'+i] || "";
                document.getElementById('menu'+i).value = val;
                document.getElementById('label'+i).innerText = val || "메뉴 "+i;
            }
            const tbody = document.getElementById('list'); tbody.innerHTML = '';
            let counts = {1:0, 2:0, 3:0};
            emps.forEach((name, i) => {
                const v = data['vote_'+i] || 0;
                if(v > 0) counts[v]++;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${name}</td>` + [1,2,3].map(n => `<td><input type="radio" name="v${i}" ${v==n?'checked':''} onclick="vote(${i},${n})"></td>`).join('');
                tbody.appendChild(tr);
            });
            [1,2,3].forEach(n => document.getElementById('c'+n).innerText = `(${counts[n]})`);
        });
    };

    function sync() { db.ref('lunch_vote').update({ menu1: document.getElementById('menu1').value, menu2: document.getElementById('menu2').value, menu3: document.getElementById('menu3').value }); }
    function vote(i, v) { db.ref('lunch_vote').update({ ['vote_'+i]: v }); }
    function resetData() { if(confirm("초기화할까요?")) db.ref('lunch_vote').set(null); }
    function copyData() { navigator.clipboard.writeText(JSON.stringify(rests)).then(() => alert("복사 완료!")); }

</html>
