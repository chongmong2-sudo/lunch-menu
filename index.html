<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAcyRvDUV67IJi3o8Z1Dl2tDHBATCN_d4Q",
        authDomain: "lunch-menu-3c36c.firebaseapp.com",
        databaseURL: "https://lunch-menu-3c36c-default-rtdb.firebaseio.com",
        projectId: "lunch-menu-3c36c",
        storageBucket: "lunch-menu-3c36c.firebasestorage.app",
        messagingSenderId: "498939490952",
        appId: "1:498939490952:web:9849dd97c3089a153a253d",
        measurementId: "G-TM7N27ZVJE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dataRef = ref(db, 'lunchData');

    // 전역 함수로 등록하여 HTML에서 호출 가능하게 함
    window.syncData = function() {
        const state = {
            m1: document.getElementById('menu1').value,
            m2: document.getElementById('menu2').value,
            m3: document.getElementById('menu3').value,
            votes: {}
        };
        employees.forEach((emp, i) => {
            const checked = document.querySelector(`input[name="vote_${i}"]:checked`);
            state.votes[i] = checked ? checked.value : null;
        });
        set(dataRef, state);
    };

    // 실시간 데이터 수신
    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        
        document.getElementById('menu1').value = data.m1 || "";
        document.getElementById('menu2').value = data.m2 || "";
        document.getElementById('menu3').value = data.m3 || "";
        
        updateTableHeaders();

        if (data.votes) {
            Object.keys(data.votes).forEach(idx => {
                const val = data.votes[idx];
                if (val) {
                    const el = document.querySelector(`input[name="vote_${idx}"][value="${val}"]`);
                    if (el) el.checked = true;
                }
            });
        }
        countVotes();
    });
</script>

    const employees = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];
    let activeMarkerEl = null;
    let editingRestaurant = null;
    let editingMarker = null;

    const savedLocations = localStorage.getItem('adjusted_restaurant_locations');
    if (savedLocations) {
        try {
            const parsedData = JSON.parse(savedLocations);
            restaurants.forEach(r => {
                const saved = parsedData.find(p => p.name === r.name);
                if (saved) { r.lat = saved.lat; r.lng = saved.lng; }
            });
        } catch(e) {}
    }

    function saveLocationsToLocal() {
        const saveArray = restaurants.map(r => ({ name: r.name, lat: r.lat, lng: r.lng }));
        localStorage.setItem('adjusted_restaurant_locations', JSON.stringify(saveArray));
    }

    function calcDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
        return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function initApp() {
        initDropdowns();
        initEmployeeList();
        initMap();
    }

    function initDropdowns() {
        const selects = ['menu1','menu2','menu3'].map(id => document.getElementById(id));
        restaurants.forEach(r => {
            selects.forEach(sel => {
                const opt = document.createElement('option');
                opt.value = r.name; opt.text = `[${r.category}] ${r.name}`;
                sel.appendChild(opt);
            });
        });
    }

    function initEmployeeList() {
        const tbody = document.getElementById('employee-list');
        tbody.innerHTML = '';
        employees.forEach((emp, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size:12px;">${emp}</td>
                <td><input type="radio" name="vote_${i}" value="1" onchange="syncData()"></td>
                <td><input type="radio" name="vote_${i}" value="2" onchange="syncData()"></td>
                <td><input type="radio" name="vote_${i}" value="3" onchange="syncData()"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateTableHeaders() {
        document.getElementById('th-menu1').innerText = document.getElementById('menu1').value || '메뉴 1';
        document.getElementById('th-menu2').innerText = document.getElementById('menu2').value || '메뉴 2';
        document.getElementById('th-menu3').innerText = document.getElementById('menu3').value || '메뉴 3';
    }

    function resetMenus() {
        if (confirm("초기화하시겠습니까?")) {
            ['menu1','menu2','menu3'].forEach(id => document.getElementById(id).value = "");
            updateTableHeaders(); initEmployeeList(); countVotes(); closeDetail();
            // 초기화 시에도 서버 동기화
            if (typeof syncData === 'function') syncData();
        }
    }

    function countVotes() {
        let counts = {1:0, 2:0, 3:0};
        document.querySelectorAll('input[type="radio"]:checked').forEach(r => counts[r.value]++);
        document.getElementById('count1').innerText = `(${counts[1]}명)`;
        document.getElementById('count2').innerText = `(${counts[2]}명)`;
        document.getElementById('count3').innerText = `(${counts[3]}명)`;
    }

    function initMap() {
        const map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(ASKTOWER_LAT, ASKTOWER_LNG),
            zoom: 17
        });

        new naver.maps.Marker({
            position: new naver.maps.LatLng(ASKTOWER_LAT, ASKTOWER_LNG),
            map,
            icon: { content: '<div class="home-marker">🏢 아스크타워</div>', anchor: new naver.maps.Point(55, 15) },
            zIndex: 100
        });

        restaurants.forEach(rest => {
            const markerDiv = document.createElement('div');
            markerDiv.className = 'custom-marker';
            markerDiv.innerText = '📍 ' + rest.name;

            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(rest.lat, rest.lng), 
                map,
                icon: { content: markerDiv, anchor: new naver.maps.Point(60, 15) }
            });

            naver.maps.Event.addListener(marker, 'click', function() {
                map.panTo(marker.getPosition());
                openDetail(rest, markerDiv, marker);
            });
        });

        naver.maps.Event.addListener(map, 'click', function(e) {
            if (editingRestaurant && editingMarker) {
                editingRestaurant.lat = e.coord.lat();
                editingRestaurant.lng = e.coord.lng();
                editingMarker.setPosition(e.coord);
                const dist = calcDistance(ASKTOWER_LAT, ASKTOWER_LNG, e.coord.lat(), e.coord.lng());
                document.getElementById('d-distance').innerText = `약 ${dist}m (직선)`;
                saveLocationsToLocal();
                alert(`✅ [${editingRestaurant.name}] 마커 위치가 이동되었습니다!`);
                editingRestaurant = null;
                editingMarker = null;
            } else {
                closeDetail();
            }
        });
    }

    function openDetail(rest, markerEl, markerObj) {
        if (activeMarkerEl) activeMarkerEl.classList.remove('active');
        activeMarkerEl = markerEl;
        markerEl.classList.add('active');
        editingRestaurant = null;
        editingMarker = null;

        document.getElementById('d-name').innerText = rest.name;
        document.getElementById('d-rating').innerText = rest.rating !== '-' ? `★ ${rest.rating}점` : '평점 정보 없음';
        document.getElementById('d-category').innerText = rest.category;

        const currentPos = markerObj.getPosition();
        const dist = calcDistance(ASKTOWER_LAT, ASKTOWER_LNG, currentPos.lat(), currentPos.lng());
        document.getElementById('d-distance').innerText = `약 ${dist}m (직선)`;
        document.getElementById('d-phone').innerText = rest.phone !== '-' ? rest.phone : '정보 없음';

        const menuContainer = document.getElementById('d-menus');
        menuContainer.innerHTML = '';
        rest.menu.split(',').map(m => m.trim()).forEach(m => {
            const tag = document.createElement('span'); tag.className = 'menu-tag'; tag.innerText = m;
            menuContainer.appendChild(tag);
        });

        document.getElementById('d-naver-link').href = `https://map.naver.com/p/entry/place/${rest.placeId}`;
        document.getElementById('d-menu-link').href = `https://map.naver.com/p/entry/place/${rest.placeId}/menu/list`;

        document.getElementById('d-edit-pos-btn').onclick = function() {
            editingRestaurant = rest;
            editingMarker = markerObj;
            alert(`📌 [${rest.name}] 위치 수정 모드입니다. 지도를 클릭해 마커를 이동시키세요.`);
        };

        const panel = document.getElementById('detail-panel');
        panel.classList.add('open');
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.remove('open');
        if (activeMarkerEl) { activeMarkerEl.classList.remove('active'); activeMarkerEl = null; }
    }

    function copyUpdatedData() {
        const dataString = JSON.stringify(restaurants, null, 8);
        const formatString = `const restaurants = ${dataString};`;
        navigator.clipboard.writeText(formatString).then(() => {
            alert("✅ 최신 좌표가 반영된 데이터가 복사되었습니다!");
        });
    }
</script>
