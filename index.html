<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 모먹지?</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        :root { --primary: #4A90E2; --danger: #e74c3c; --bg: #F4F7F6; --border: #E0E0E0; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* 왼쪽 패널 디자인 */
        .left-panel { width: 400px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .header { padding: 12px 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 16px; }
        .btn-copy { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: 700; }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .section { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 투표 테이블 */
        .voting-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; }
        .voting-table th { background: #f9f9f9; }
        .vote-count { color: var(--danger); font-weight: 700; display: block; font-size: 11px; }

        /* [핵심] 왼쪽 하단 고정 정보창 */
        #bottom-info-panel { padding: 15px; background: #fff; border-top: 2px solid #ff9f43; min-height: 230px; display: none; }
        .info-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .info-row { font-size: 12px; margin-bottom: 6px; color: #555; display: flex; }
        .info-label { font-weight: 700; color: #888; width: 75px; flex-shrink: 0; }
        .info-btns { display: flex; gap: 8px; margin-top: 15px; }
        .btn-link { flex: 1; padding: 10px; border-radius: 4px; text-align: center; text-decoration: none; color: white; font-weight: 700; font-size: 13px; }
        .map-link { background: #03C75A; }
        .menu-link { background: #ff9f43; }

        /* [핵심] 지도 위 마우스 오버 팝업 (툴팁) */
        .map-popup {
            position: absolute; display: none; background: white; border: 1px solid var(--primary);
            padding: 10px; border-radius: 8px; font-size: 12px; z-index: 1000;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2); pointer-events: none; min-width: 150px;
        }
        .map-popup strong { display: block; font-size: 14px; margin-bottom: 4px; color: var(--primary); }

        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .custom-marker { background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 3px 8px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div id="map-popup" class="map-popup"></div>

<div class="left-panel">
    <div class="header">🍱 아스크타워 맛집지도 <button class="btn-copy">데이터 복사</button></div>
    
    <div class="scroll-area">
        <div class="section">
            <div class="section-title">1. 선착순 메뉴 선점 <button style="font-size:10px; cursor:pointer;" onclick="resetData()">↻ 초기화</button></div>
            <select id="menu1" onchange="sync()"><option value="">메뉴 1 선택</option></select>
            <select id="menu2" onchange="sync()"><option value="">메뉴 2 선택</option></select>
            <select id="menu3" onchange="sync()"><option value="">메뉴 3 선택</option></select>
        </div>

        <div class="section">
            <div class="section-title">2. 실시간 투표 현황 (11명)</div>
            <table class="voting-table">
                <thead>
                    <tr>
                        <th width="25%">이름</th>
                        <th><span id="label1">1</span><span class="vote-count" id="c1">(0명)</span></th>
                        <th><span id="label2">2</span><span class="vote-count" id="c2">(0명)</span></th>
                        <th><span id="label3">3</span><span class="vote-count" id="c3">(0명)</span></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>

    <div id="bottom-info-panel">
        <div class="info-title" id="res-name">식당 정보</div>
        <div class="info-row"><span class="info-label">분류/거리</span> <span id="res-cat">-</span> / <span id="res-dist">-</span></div>
        <div class="info-row"><span class="info-label">메인메뉴</span> <span id="res-menu">-</span></div>
        <div class="info-row"><span class="info-label">평점/전화</span> ⭐<span id="res-rate">-</span> / <span id="res-tel">-</span></div>
        <div class="info-row"><span class="info-label">주소</span> <span id="res-addr">-</span></div>
        <div class="info-row"><span class="info-label">비고</span> <span id="res-note">-</span></div>
        <div class="info-btns">
            <a href="#" id="link-map" target="_blank" class="btn-link map-link">네이버 지도</a>
            <a href="#" id="link-menu" target="_blank" class="btn-link menu-link">메뉴판 보기</a>
        </div>
    </div>
</div>

<div class="right-panel"><div id="map"></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAcyRvDUV67IJi3o8Z1Dl2tDHBATCN_d4Q", authDomain: "lunch-menu-3c36c.firebaseapp.com", databaseURL: "https://lunch-menu-3c36c-default-rtdb.firebaseio.com", projectId: "lunch-menu-3c36c", storageBucket: "lunch-menu-3c36c.appspot.com", messagingSenderId: "498939490952", appId: "1:498939490952:web:9849dd97c3089a153a253d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const emps = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임효준", "장현진"];
    
    // 식당 데이터 생략 (동일하게 유지)
    const rests = [ /* ... 60개 식당 데이터 ... */ ];

    let map;
    const popup = document.getElementById('map-popup');

    window.onload = function() {
        // 메뉴 선택 드롭다운 설정
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        rests.forEach(r => sels.forEach(s => s.add(new Option(`[${r.cat}] ${r.name}`, r.name))));
        
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        
        // 내 위치 마커
        new naver.maps.Marker({ position: new naver.maps.LatLng(37.476742, 126.889731), map: map, icon: { content: '<div style="background:#e74c3c; color:white; padding:5px 10px; border-radius:20px; font-weight:700; font-size:12px;">🚩 아스크타워</div>', anchor: new naver.maps.Point(50, 15) } });

        rests.forEach(r => {
            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(r.lat, r.lng),
                map: map,
                icon: { content: `<div class="custom-marker">${r.name}</div>`, anchor: new naver.maps.Point(40, 15) }
            });

            // 1. 마우스 오버 시: 지도 위 팝업 노출
            naver.maps.Event.addListener(marker, 'mouseover', (e) => {
                popup.style.display = 'block';
                popup.innerHTML = `<strong>${r.name}</strong>분류/거리: ${r.cat} / ${r.dist}<br>메인메뉴: ${r.menu}`;
            });

            naver.maps.Event.addListener(marker, 'mousemove', (e) => {
                popup.style.left = (e.originalEvent.clientX + 15) + 'px';
                popup.style.top = (e.originalEvent.clientY + 15) + 'px';
            });

            naver.maps.Event.addListener(marker, 'mouseout', () => {
                popup.style.display = 'none';
            });

            // 2. 클릭 시: 왼쪽 하단 상세 정보창 노출
            naver.maps.Event.addListener(marker, 'click', () => {
                const panel = document.getElementById('bottom-info-panel');
                panel.style.display = 'block';
                document.getElementById('res-name').innerText = r.name;
                document.getElementById('res-cat').innerText = r.cat;
                document.getElementById('res-dist').innerText = r.dist;
                document.getElementById('res-menu').innerText = r.menu;
                document.getElementById('res-rate').innerText = r.rate;
                document.getElementById('res-tel').innerText = r.tel;
                document.getElementById('res-addr').innerText = r.addr;
                document.getElementById('res-note').innerText = r.note || "-";
                document.getElementById('link-map').href = `https://map.naver.com/v5/search/${encodeURIComponent(r.name)}`;
                document.getElementById('link-menu').href = `https://search.naver.com/search.naver?query=${encodeURIComponent(r.name + ' 메뉴판')}`;
            });
        });

        // Firebase 연동 부분 (동일)
        db.ref('lunch_vote').on('value', snap => {
            const data = snap.val() || {};
            const tbody = document.getElementById('list'); tbody.innerHTML = '';
            let counts = {1:0, 2:0, 3:0};
            emps.forEach((name, i) => {
                const v = data['vote_'+i] || 0;
                if(v > 0) counts[v]++;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${name}</td>` + [1,2,3].map(n => `<td><input type="radio" name="v${i}" ${v==n?'checked':''} onclick="vote(${i},${n})"></td>`).join('');
                tbody.appendChild(tr);
            });
            [1,2,3].forEach(n => {
                document.getElementById('c'+n).innerText = `(${counts[n]}명)`;
                const menuVal = data['menu'+n] || "";
                document.getElementById('menu'+n).value = menuVal;
                document.getElementById('label'+n).innerText = menuVal || "메뉴 "+n;
            });
        });
    };

    function sync() { db.ref('lunch_vote').update({ menu1: document.getElementById('menu1').value, menu2: document.getElementById('menu2').value, menu3: document.getElementById('menu3').value }); }
    function vote(i, v) { db.ref('lunch_vote').update({ ['vote_'+i]: v }); }
    function resetData() { if(confirm("초기화할까요?")) db.ref('lunch_vote').set(null); }
</script>
</body>
</html>
