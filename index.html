<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 점심 뭐 먹지? - 아스크타워</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        :root { --primary: #4A90E2; --danger: #e74c3c; --bg: #F4F7F6; --border: #E0E0E0; --green: #03C75A; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); }

        /* 왼쪽 패널 고정 및 스크롤 설정 */
        .left-panel { 
            width: 400px; 
            min-width: 400px; /* 줄어들지 않게 고정 */
            background: white; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            z-index: 20; 
        }
        .header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: 700; flex-shrink: 0; }
        .btn-copy { background: var(--green); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        /* 메뉴 리스트가 길어져도 내부에서 스크롤되게 함 */
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .btn-reset { background: var(--danger); color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .menu-slot { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .menu-slot span { width: 50px; font-weight: 700; color: var(--primary); }
        .menu-slot select { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid var(--border); }

        .voting-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; }
        .voting-table th { background: #f9f9f9; height: 50px; }
        .vote-count { color: var(--danger); font-weight: 700; display: block; font-size: 11px; }

        /* 지도 및 툴팁 */
        .right-panel { flex: 1; position: relative; height: 100%; }
        #map { width: 100%; height: 100%; }
        
        #tooltip {
            position: fixed; /* absolute에서 fixed로 변경하여 가려짐 방지 */
            display: none;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 9999; /* 무조건 최상단 */
            pointer-events: none;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .home-marker { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 20px; font-weight: 700; font-size: 12px; border: 2px solid #c0392b; white-space: nowrap; }
        .custom-marker { background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 3px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer; }
    </style>
</head>
<body>
<div id="tooltip"></div>

<div class="left-panel">
    <div class="header">🍱 아스크타워 맛집지도 <button class="btn-copy" onclick="copyData()">💾 데이터 복사</button></div>
    <div class="scroll-area">
        <div class="section">
            <div class="section-title">1. 선착순 메뉴 3개 선점 <button class="btn-reset" onclick="resetData()">↻ 전체 초기화</button></div>
            <div class="menu-slot"><span>메뉴 1</span><select id="menu1" onchange="sync()"><option value="">선택하세요</option></select></div>
            <div class="menu-slot"><span>메뉴 2</span><select id="menu2" onchange="sync()"><option value="">선택하세요</option></select></div>
            <div class="menu-slot"><span>메뉴 3</span><select id="menu3" onchange="sync()"><option value="">선택하세요</option></select></div>
        </div>
        <div class="section">
            <div class="section-title">2. 실시간 투표 현황 (11명)</div>
            <table class="voting-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th><span id="label1">메뉴 1</span><span class="vote-count" id="c1">(0명)</span></th>
                        <th><span id="label2">메뉴 2</span><span class="vote-count" id="c2">(0명)</span></th>
                        <th><span id="label3">메뉴 3</span><span class="vote-count" id="c3">(0명)</span></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
</div>
<div class="right-panel"><div id="map"></div></div>

    const rests = [

t":"138m","menu":"순두부 한상"},{"name":"사월에보리밥과쭈꾸미","lat":37.477434,"lng":126.888973,"cat":"밥","dist":"102m","menu":"보리밥, 쭈꾸미"},{"name":"두끼","lat":37.477596,"lng":126.888783,"cat":"분식","dist":"126m","menu":"즉석떡볶이"},{"name":"백초밥","lat":37.477324,"lng":126.889030,"cat":"일식","dist":"90m","menu":"초밥"},{"name":"마치다쇼텐","lat":37.478497,"lng":126.885305,"cat":"라멘","dist":"439m","menu":"라멘"},{"name":"광화문미진","lat":37.477730,"lng":126.888808,"cat":"면","dist":"137m","menu":"메밀, 우동"},{"name":"101번지남산돈까스","lat":37.477510,"lng":126.888902,"cat":"일식","dist":"110m","menu":"왕돈까스"},{"name":"니뽕내뽕","lat":37.477871,"lng":126.888795,"cat":"중식","dist":"150m","menu":"퓨전 짬뽕"},{"name":"전주식당","lat":37.477052,"lng":126.890982,"cat":"밥","dist":"115m","menu":"백반"},{"name":"보경닭한마리","lat":37.478035,"lng":126.890312,"cat":"탕","dist":"151m","menu":"닭볶음탕"},{"name":"연식당순대국","lat":37.478049,"lng":126.890375,"cat":"탕","dist":"155m","menu":"순대국"},{"name":"역전우동","lat":37.475355,"lng":126.890435,"cat":"일식","dist":"166m","menu":"우동, 소바"},{"name":"한솥도시락","lat":37.475391,"lng":126.890379,"cat":"밥","dist":"160m","menu":"도시락"},{"name":"싸다김밥","lat":37.475152,"lng":126.890561,"cat":"분식","dist":"191m","menu":"김밥, 분식"},{"name":"맘스터치","lat":37.475314,"lng":126.890451,"cat":"버거","dist":"171m","menu":"버거"},{"name":"서울막창","lat":37.475110,"lng":126.890632,"cat":"고기","dist":"201m","menu":"막창, 곱창"},{"name":"마라홀릭","lat":37.475067,"lng":126.890650,"cat":"중식","dist":"203m","menu":"마라탕"},{"name":"미분당","lat":37.475008,"lng":126.891136,"cat":"면","dist":"230m","menu":"쌀국수"},{"name":"정백어가","lat":37.476613,"lng":126.887140,"cat":"밥","dist":"229m","menu":"생선구이"},{"name":"소요카제","lat":37.475134,"lng":126.891399,"cat":"일식","dist":"233m","menu":"라멘"},{"name":"본래순대","lat":37.474677,"lng":126.890426,"cat":"탕","dist":"237m","menu":"순대국"},{"name":"진케이","lat":37.475101,"lng":126.891316,"cat":"일식","dist":"234m","menu":"초밥"},{"name":"반마리찜닭","lat":37.474641,"lng":126.890346,"cat":"찜닭","dist":"240m","menu":"찜닭"},{"name":"본죽&비빔밥","lat":37.474614,"lng":126.890289,"cat":"죽","dist":"242m","menu":"죽, 비빔밥"},{"name":"포빈","lat":37.474172,"lng":126.889909,"cat":"베트남","dist":"286m","menu":"쌀국수"},{"name":"보승회관","lat":37.474096,"lng":126.889676,"cat":"국밥","dist":"294m","menu":"순대국, 수육"},{"name":"조려당","lat":37.473987,"lng":126.889357,"cat":"밥","dist":"308m","menu":"두부조림"},{"name":"소플러스","lat":37.474071,"lng":126.890126,"cat":"고기","dist":"300m","menu":"소갈비살"},{"name":"담소소사골순대","lat":37.473942,"lng":126.889373,"cat":"탕","dist":"313m","menu":"순대국"},{"name":"궁정짬뽕","lat":37.473911,"lng":126.889257,"cat":"중식","dist":"317m","menu":"짬뽕"},{"name":"새벽집","lat":37.473744,"lng":126.889014,"cat":"밥","dist":"339m","menu":"순두부"},{"name":"동그라미 김치찌개","lat":37.473724,"lng":126.888950,"cat":"찌개","dist":"341m","menu":"김치찌개"},{"name":"오한수우육면가","lat":37.473703,"lng":126.888871,"cat":"면","dist":"344m","menu":"우육면"},{"name":"신전떡볶이","lat":37.473635,"lng":126.888748,"cat":"분식","dist":"354m","menu":"떡볶이"},{"name":"마이푸드","lat":37.476652,"lng":126.885938,"cat":"뷔페","dist":"334m","menu":"한식 뷔페"},{"name":"애슐리퀸즈","lat":37.476269,"lng":126.887158,"cat":"뷔페","dist":"233m","menu":"양식 뷔페"},{"name":"큐큐면관","lat":37.480708,"lng":126.885177,"cat":"중식","dist":"591m","menu":"중식 일반"},{"name":"자연밥상","lat":37.473857,"lng":126.887292,"cat":"밥","dist":"382m","menu":"한식 백반"},{"name":"진된장","lat":37.480679,"lng":126.885032,"cat":"찌개","dist":"603m","menu":"된장찌개"}
    ];

    let map;
    const tooltip = document.getElementById('tooltip');

    window.onload = function() {
        const sels = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        rests.forEach(r => sels.forEach(s => s.add(new Option(`[${r.cat}] ${r.name}`, r.name))));
        
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.476742, 126.889731), zoom: 17 });
        
        // 아스크타워 마커
        new naver.maps.Marker({ 
            position: new naver.maps.LatLng(37.476742, 126.889731), map: map, 
            icon: { content: '<div class="home-marker">🚩 아스크타워</div>', anchor: new naver.maps.Point(50, 15) } 
        });
        
        rests.forEach(r => {
            const marker = new naver.maps.Marker({ 
                position: new naver.maps.LatLng(r.lat, r.lng), map: map, 
                icon: { content: `<div class="custom-marker">${r.name}</div>`, anchor: new naver.maps.Point(40, 15) } 
            });

            // 툴팁 이벤트
            naver.maps.Event.addListener(marker, 'mouseover', (e) => {
                tooltip.style.display = 'block';
                tooltip.innerHTML = `<strong>${r.name}</strong><br>분류: ${r.cat}<br>거리: ${r.dist}<br>메뉴: ${r.menu}`;
            });
            naver.maps.Event.addListener(marker, 'mousemove', (e) => {
                // fixed 포지션이므로 클라이언트 좌표 사용
                tooltip.style.left = (e.originalEvent.clientX + 15) + 'px';
                tooltip.style.top = (e.originalEvent.clientY + 15) + 'px';
            });
            naver.maps.Event.addListener(marker, 'mouseout', () => tooltip.style.display = 'none');
        });

        // Firebase 리스너
        db.ref('lunch_vote').on('value', snap => {
            const data = snap.val() || {};
            for(let i=1; i<=3; i++) {
                const val = data['menu'+i] || "";
                document.getElementById('menu'+i).value = val;
                document.getElementById('label'+i).innerText = val || "메뉴 "+i;
            }
            const tbody = document.getElementById('list'); 
            tbody.innerHTML = '';
            let counts = {1:0, 2:0, 3:0};
            emps.forEach((name, i) => {
                const v = data['vote_'+i] || 0;
                if(v > 0) counts[v]++;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${name}</td>` + 
                    [1,2,3].map(n => `<td><input type="radio" name="v${i}" ${v==n?'checked':''} onclick="vote(${i},${n})"></td>`).join('');
                tbody.appendChild(tr);
            });
            [1,2,3].forEach(n => document.getElementById('c'+n).innerText = `(${counts[n]}명)`);
        });
    };

    function sync() { db.ref('lunch_vote').update({ menu1: document.getElementById('menu1').value, menu2: document.getElementById('menu2').value, menu3: document.getElementById('menu3').value }); }
    function vote(i, v) { db.ref('lunch_vote').update({ ['vote_'+i]: v }); }
    function resetData() { if(confirm("전체 초기화할까요?")) db.ref('lunch_vote').set(null); }
    function copyData() { navigator.clipboard.writeText(JSON.stringify(rests)).then(() => alert("데이터 복사 완료!")); }
</script>
</body>
</html>
