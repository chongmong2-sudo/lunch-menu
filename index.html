<!DOCTYPE html>
<html lang="ko">
<head>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        :root {
            --primary: #4A90E2;
            --primary-dark: #2c6fba;
            --danger: #e74c3c;
            --bg: #F4F7F6;
            --border: #E0E0E0;
            --text: #222;
            --text-muted: #888;
            --green: #03C75A;
            --m1: #e74c3c;
            --m2: #9b59b6;
            --m3: #e67e22;
            --panel-width: 400px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }

        .left-panel { width: var(--panel-width); background: white; box-shadow: 2px 0 12px rgba(0,0,0,0.07); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 14px 20px; background: var(--primary); color: white; text-align: center; font-size: 19px; font-weight: 700; letter-spacing: -0.5px; flex-shrink: 0; }
        .scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .section { padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-title { font-size: 14px; font-weight: 700; }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
        .btn-reset:hover { background: #c0392b; }

        .menu-slot { display: flex; align-items: center; margin-bottom: 7px; gap: 6px; }
        .menu-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .menu-dot.m1 { background: var(--m1); }
        .menu-dot.m2 { background: var(--m2); }
        .menu-dot.m3 { background: var(--m3); }
        .menu-label { font-weight: 700; width: 42px; color: var(--primary); font-size: 13px; flex-shrink: 0; }
        .menu-slot select { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: #fafafa; color: var(--text); cursor: pointer; }
        .menu-slot select:focus { outline: none; border-color: var(--primary); }

        .voting-table { width: 100%; border-collapse: collapse; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 6px 3px; text-align: center; font-size: 12px; }
        .voting-table th { background: #f5f5f5; font-weight: 700; }
        .vote-count { display: block; font-size: 10px; margin-top: 2px; font-weight: 700; }
        input[type="radio"] { cursor: pointer; transform: scale(1.2); }
        input[type="radio"].r1 { accent-color: var(--m1); }
        input[type="radio"].r2 { accent-color: var(--m2); }
        input[type="radio"].r3 { accent-color: var(--m3); }

        /* 상세 패널 */
        .detail-panel { flex-shrink: 0; background: white; border-top: 2px solid var(--primary); overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; opacity: 0; }
        .detail-panel.open { max-height: 460px; opacity: 1; }
        .detail-inner { padding: 14px 18px 16px; }
        .detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .detail-name { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; line-height: 1.3; }
        .detail-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 0 0 0 8px; }
        .detail-close:hover { color: var(--danger); }
        .detail-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: white; margin-bottom: 6px; }
        .detail-rating { font-size: 13px; color: #f39c12; font-weight: 700; margin-bottom: 8px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .detail-item { background: #f8f9fa; border-radius: 8px; padding: 7px 10px; }
        .detail-item-label { font-size: 10px; color: var(--text-muted); font-weight: 500; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-item-value { font-size: 12px; color: var(--text); font-weight: 500; }
        .detail-menu-section { margin-bottom: 11px; }
        .detail-menu-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .menu-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .menu-tag { background: #EEF5FF; color: var(--primary-dark); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
        .btn-row { display: flex; gap: 8px; }
        .naver-btn { flex: 1; display: block; padding: 9px; background: var(--green); color: white; text-align: center; border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; transition: background 0.2s; font-family: inherit; border: none; cursor: pointer; }
        .naver-btn:hover { background: #02a84a; }
        .naver-btn.menu-btn { background: #FF6B35; }
        .naver-btn.menu-btn:hover { background: #e55a28; }

        /* 지도 */
        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        /* 마커 기본 */
        .cm { background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 3px 9px; font-size: 11px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.15); cursor: pointer; white-space: nowrap; color: #333; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; line-height: 1.4; }

        .cm.sel1 { background: var(--m1) !important; color: white !important; border-color: #c0392b !important; padding: 5px 13px !important; font-size: 13px !important; box-shadow: 0 4px 14px rgba(231,76,60,0.55) !important; transform: scale(1.15) !important; z-index: 999; }
        .cm.sel2 { background: var(--m2) !important; color: white !important; border-color: #7d3c98 !important; padding: 5px 13px !important; font-size: 13px !important; box-shadow: 0 4px 14px rgba(155,89,182,0.55) !important; transform: scale(1.15) !important; z-index: 999; }
        .cm.sel3 { background: var(--m3) !important; color: white !important; border-color: #ca6f1e !important; padding: 5px 13px !important; font-size: 13px !important; box-shadow: 0 4px 14px rgba(230,126,34,0.55) !important; transform: scale(1.15) !important; z-index: 999; }

        .lg-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

</head>

                <div class="detail-grid">

                <div class="detail-menu-section">
                    <div class="detail-menu-label">🍽 메뉴</div>
                    <div class="menu-tags" id="d-menus"></div>
                </div>
                <div class="btn-row">

                    <a class="naver-btn menu-btn" id="d-menu" href="#" target="_blank">📋 메뉴판 보기</a>
                </div>
            </div>
        </div>
    </div>
</div>

        { name:"진심담은 된장찌개 진된장",   menu:"봄동 비빔밥, 된장전골, 칼비빔면", category:"찌개",        rating:"93",    phone:"0507-1469-0429", placeId:"1308989777", lat:37.47638, lng:126.88342 },

    const employees = ["김미연","김혁중","류한식","박윤영","송원호","신윤철","안서형","우성욱","이홍비","임호준","장현진"];
    const markerEls = {}; // name → div
    let activeEl = null;

    function dist(lat1,lng1,lat2,lng2){
        const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
        return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
    }

    function initApp(){
        // 드롭다운
        const sels=['menu1','menu2','menu3'].map(id=>document.getElementById(id));
        restaurants.forEach(r=>sels.forEach(s=>{
            const o=document.createElement('option'); o.value=r.name; o.text=`[${r.category}] ${r.name}`; s.appendChild(o);
        }));
        // 직원 목록
        const tb=document.getElementById('emp-list'); tb.innerHTML='';
        employees.forEach((e,i)=>{
            const tr=document.createElement('tr');
            tr.innerHTML=`<td style="font-size:12px">${e}</td>
                <td><input type="radio" class="r1" name="v${i}" value="1" onchange="countVotes()"></td>
                <td><input type="radio" class="r2" name="v${i}" value="2" onchange="countVotes()"></td>
                <td><input type="radio" class="r3" name="v${i}" value="3" onchange="countVotes()"></td>`;
            tb.appendChild(tr);
        });
        initMap();
    }

    function initMap(){
        const map=new naver.maps.Map('map',{center:new naver.maps.LatLng(AT_LAT,AT_LNG),zoom:17});

        // 아스크타워 마커
        new naver.maps.Marker({
            position:new naver.maps.LatLng(AT_LAT,AT_LNG), map,
            icon:{content:'<div class="home-mk">🏢 아스크타워 (우리회사)</div>',anchor:new naver.maps.Point(75,15)},
            zIndex:200
        });

        restaurants.forEach(r=>{
            const pos=new naver.maps.LatLng(r.lat,r.lng);
            const div=document.createElement('div'); div.className='cm'; div.innerText='📍 '+r.name;
            markerEls[r.name]=div;
            const mk=new naver.maps.Marker({position:pos,map,icon:{content:div,anchor:new naver.maps.Point(55,14)}});
            naver.maps.Event.addListener(mk,'click',()=>{ map.panTo(pos); openDetail(r,div); });
        });

        naver.maps.Event.addListener(map,'click',()=>closeDetail());
    }

    function onMenuChange(){
        const v1=document.getElementById('menu1').value;
        const v2=document.getElementById('menu2').value;
        const v3=document.getElementById('menu3').value;

        // 헤더 업데이트
        document.getElementById('th1').innerText=v1||'메뉴 1';
        document.getElementById('th2').innerText=v2||'메뉴 2';
        document.getElementById('th3').innerText=v3||'메뉴 3';

        // 모든 마커 선택 클래스 제거
        Object.values(markerEls).forEach(el=>el.classList.remove('sel1','sel2','sel3'));

        // 선택된 마커 강조
        if(v1&&markerEls[v1]){ markerEls[v1].classList.add('sel1'); }
        if(v2&&markerEls[v2]){ markerEls[v2].classList.add('sel2'); }
        if(v3&&markerEls[v3]){ markerEls[v3].classList.add('sel3'); }

        // 범례
        const lg=document.getElementById('legend');
        const show=v1||v2||v3;
        lg.classList.toggle('show',!!show);
        const l1=document.getElementById('lg1'), l2=document.getElementById('lg2'), l3=document.getElementById('lg3');
        l1.style.display=v1?'flex':'none'; if(v1) document.getElementById('lg1t').innerText=v1;
        l2.style.display=v2?'flex':'none'; if(v2) document.getElementById('lg2t').innerText=v2;
        l3.style.display=v3?'flex':'none'; if(v3) document.getElementById('lg3t').innerText=v3;
    }

    function countVotes(){
        const c={1:0,2:0,3:0};
        document.querySelectorAll('input[type=radio]:checked').forEach(r=>c[r.value]++);
        document.getElementById('cnt1').innerText=`(${c[1]}명)`;
        document.getElementById('cnt2').innerText=`(${c[2]}명)`;
        document.getElementById('cnt3').innerText=`(${c[3]}명)`;
    }

    function resetAll(){
        if(!confirm('선택된 메뉴와 투표 내역을 모두 초기화하시겠습니까?')) return;
        ['menu1','menu2','menu3'].forEach(id=>document.getElementById(id).value='');
        onMenuChange(); countVotes();
        document.getElementById('emp-list').querySelectorAll('input[type=radio]').forEach(r=>r.checked=false);
        closeDetail();
    }

    function openDetail(r, el){
        // 이전 active 마커 정리
        if(activeEl && !activeEl.classList.contains('sel1') && !activeEl.classList.contains('sel2') && !activeEl.classList.contains('sel3')){
            activeEl.classList.remove('active');
        }
        activeEl=el;
        if(!el.classList.contains('sel1')&&!el.classList.contains('sel2')&&!el.classList.contains('sel3')) el.classList.add('active');

        document.getElementById('d-name').innerText=r.name;
        document.getElementById('d-rating').innerText=r.rating!=='-'?`★ ${r.rating}점`:'평점 정보 없음';
        document.getElementById('d-cat').innerText=r.category;
        document.getElementById('d-dist').innerText=`약 ${dist(AT_LAT,AT_LNG,r.lat,r.lng)}m (직선)`;
        document.getElementById('d-phone').innerText=r.phone!=='-'?r.phone:'정보 없음';

        // 선택된 메뉴 배지
        const badge=document.getElementById('d-badge'); badge.innerHTML='';
        const v1=document.getElementById('menu1').value, v2=document.getElementById('menu2').value, v3=document.getElementById('menu3').value;
        if(r.name===v1){ const b=document.createElement('span'); b.className='detail-badge'; b.style.background='var(--m1)'; b.innerText='✓ 메뉴 1 선정'; badge.appendChild(b); }
        if(r.name===v2){ const b=document.createElement('span'); b.className='detail-badge'; b.style.background='var(--m2)'; b.innerText='✓ 메뉴 2 선정'; badge.appendChild(b); }
        if(r.name===v3){ const b=document.createElement('span'); b.className='detail-badge'; b.style.background='var(--m3)'; b.innerText='✓ 메뉴 3 선정'; badge.appendChild(b); }

        const mc=document.getElementById('d-menus'); mc.innerHTML='';
        r.menu.split(',').map(m=>m.trim()).forEach(m=>{ const t=document.createElement('span'); t.className='menu-tag'; t.innerText=m; mc.appendChild(t); });

        document.getElementById('d-map').href=`https://map.naver.com/p/entry/place/${r.placeId}`;
        document.getElementById('d-menu').href=`https://map.naver.com/p/entry/place/${r.placeId}/menu/list`;

        const panel=document.getElementById('detail-panel');
        panel.classList.add('open');
        setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
    }

    function closeDetail(){
        document.getElementById('detail-panel').classList.remove('open');
        if(activeEl){ if(!activeEl.classList.contains('sel1')&&!activeEl.classList.contains('sel2')&&!activeEl.classList.contains('sel3')) activeEl.classList.remove('active'); activeEl=null; }
    }
</script>
