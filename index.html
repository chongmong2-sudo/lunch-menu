<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>오늘 점심 뭐 먹지?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ncpKeyId"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; padding: 20px; background: #f8f9fa; border-right: 1px solid #ddd; overflow-y: auto; z-index: 10; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #map { flex: 1; height: 100%; }
        h2 { font-size: 1.2rem; color: #333; margin-bottom: 20px; }
        .section { margin-bottom: 25px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f1f3f5; }
        .vote-btn { cursor: pointer; color: #007bff; font-weight: bold; }
        .vote-count { color: #e03131; font-weight: bold; display: block; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 id="main-title">오늘 점심 뭐 먹지? 🍱</h2>
    
    <div class="section">
        <h3>1. 후보 메뉴 선정</h3>
        <select id="menu1"><option value="">메뉴 1 선택</option></select>
        <select id="menu2"><option value="">메뉴 2 선택</option></select>
        <select id="menu3"><option value="">메뉴 3 선택</option></select>
    </div>

    <div class="section">
        <h3>2. 실시간 투표 결과</h3>
        <table>
            <thead>
                <tr>
                    <th>이름</th>
                    <th id="h1">메뉴1<br><span class="vote-count">(0명)</span></th>
                    <th id="h2">메뉴2<br><span class="vote-count">(0명)</span></th>
                    <th id="h3">메뉴3<br><span class="vote-count">(0명)</span></th>
                </tr>
            </thead>
            <tbody id="vote-table-body">
                </tbody>
        </table>
    </div>
</div>

<div id="map"></div>

<script type="module">
    // Firebase SDK 임포트
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 원호님의 Firebase 설정 정보 적용
    const firebaseConfig = {
        apiKey: "AIzaSyAcyRvDUV67IJi3o8Z1Dl2tDHBATCN_d4Q",
        authDomain: "lunch-menu-3c36c.firebaseapp.com",
        databaseURL: "https://lunch-menu-3c36c-default-rtdb.firebaseio.com",
        projectId: "lunch-menu-3c36c",
        storageBucket: "lunch-menu-3c36c.firebasestorage.app",
        messagingSenderId: "498939490952",
        appId: "1:498939490952:web:9849dd97c3089a153a253d",
        measurementId: "G-TM7N27ZVJE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dataRef = ref(db, 'lunchData');

    // 1. 식당 데이터 (51개 리스트 복구)
    const restaurants = [
        { name: "가산삼계탕", lat: 37.4800, lng: 126.8820 },
        { name: "얌얌한식뷔페", lat: 37.4784, lng: 126.8812 },
        { name: "구름산 추어탕", lat: 37.4771, lng: 126.8821 },
        { name: "가온당", lat: 37.4795, lng: 126.8805 },
        // ... (나머지 식당들은 원본 배열을 유지해주세요)
    ];

    const users = ["김미연", "김학종", "무원석", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이종희", "임효준", "장원진"];

    // 2. 지도 초기화
    const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.479, 126.881),
        zoom: 17
    });

    // 식당 마커 생성
    restaurants.forEach(rest => {
        new naver.maps.Marker({
            position: new naver.maps.LatLng(rest.lat, rest.lng),
            map: map,
            title: rest.name
        });
    });

    // 3. 드롭다운 메뉴 채우기
    const selects = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
    selects.forEach(sel => {
        restaurants.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.name;
            opt.textContent = r.name;
            sel.appendChild(opt);
        });
        sel.addEventListener('change', saveData);
    });

    // 4. 투표 테이블 생성
    const tbody = document.getElementById('vote-table-body');
    users.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${user}</td>
            <td><input type="radio" name="${user}" value="0" onclick="saveData()"></td>
            <td><input type="radio" name="${user}" value="1" onclick="saveData()"></td>
            <td><input type="radio" name="${user}" value="2" onclick="saveData()"></td>`;
        tbody.appendChild(tr);
    });

    // 데이터 저장 (Firebase)
    function saveData() {
        const selectedMenus = selects.map(s => s.value);
        const votes = {};
        users.forEach(u => {
            const checked = document.querySelector(`input[name="${u}"]:checked`);
            votes[u] = checked ? checked.value : null;
        });
        set(dataRef, { selectedMenus, votes });
    }

    // 데이터 수신 (실시간 동기화)
    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // 메뉴 이름 업데이트
        data.selectedMenus.forEach((name, i) => {
            selects[i].value = name || "";
            document.getElementById(`h${i+1}`).firstChild.textContent = name || `메뉴${i+1}`;
        });

        // 투표 현황 업데이트
        const counts = [0, 0, 0];
        users.forEach(u => {
            const val = data.votes[u];
            if (val !== null && val !== undefined) {
                document.querySelector(`input[name="${u}"][value="${val}"]`).checked = true;
                counts[val]++;
            }
        });

        // 투표수 표시
        counts.forEach((c, i) => {
            document.querySelector(`#h${i+1} .vote-count`).textContent = `(${c}명)`;
        });
    });
</script>
</body>
</html>
