        { "name": "새벽집", "menu": "청국장, 순두부, 찌개", "category": "밥", "distance": "339m", "rating": "-", "placeId": "1258624016", "lat": 37.4737449, "lng": 126.8890148 },
        { "name": "동그라미 김치찌개삼겹살", "menu": "김치/된장/부대 찌개, 불고기", "category": "밥", "distance": "341m", "rating": "90", "placeId": "1998006286", "lat": 37.4737246, "lng": 126.8889507 },
        { "name": "오한수우육면가", "menu": "우육탕, 도가니탕", "category": "면", "distance": "344m", "rating": "-", "placeId": "1046477869", "lat": 37.4737038, "lng": 126.8888712 },
        { "name": "신전떡볶이", "menu": "떡튀순", "category": "분식", "distance": "354m", "rating": "93", "placeId": "33704297", "lat": 37.4736352, "lng": 126.8887481 },
        { "name": "마이푸드 구내식당", "menu": "한식뷔페", "category": "뷔페", "distance": "334m", "rating": "90", "placeId": "2031045305", "lat": 37.4766526, "lng": 126.8859383 },
        { "name": "애슐리퀸즈", "menu": "뷔페", "category": "뷔페", "distance": "233m", "rating": "-", "placeId": "1611381835", "lat": 37.4762692, "lng": 126.8871583 },
        { "name": "큐큐면관", "menu": "짜장, 짬뽕, 탕수육", "category": "중식", "distance": "591m", "rating": "-", "placeId": "1550173990", "lat": 37.4807088, "lng": 126.8851774 },
        { "name": "자연밥상", "menu": "백반/한식", "category": "밥", "distance": "382m", "rating": "86.5", "placeId": "1112254054", "lat": 37.473857, "lng": 126.8872922 },
        { "name": "진심담은 된장찌개 진된장", "menu": "된장전골, 칼비빔면", "category": "찌개", "distance": "603m", "rating": "93", "placeId": "1308989777", "lat": 37.4806795, "lng": 126.8850328 }
    ];

    const employees = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];
    let map, activeMarkerEl;

    window.onload = function() {
        initDropdowns();
        initMap();
        db.ref('lunch_vote').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            updateUI(data);
        });
    };

    function initDropdowns() {
        const selects = ['menu1','menu2','menu3'].map(id => document.getElementById(id));
        restaurants.forEach(r => {
            selects.forEach(sel => {
                const opt = document.createElement('option');
                opt.value = r.name; opt.text = `[${r.category}] ${r.name}`;
                sel.appendChild(opt);
            });
        });
    }

    function initMap() {
        map = new naver.maps.Map('map', { center: new naver.maps.LatLng(ASKTOWER_LAT, ASKTOWER_LNG), zoom: 17 });
        new naver.maps.Marker({
            position: new naver.maps.LatLng(ASKTOWER_LAT, ASKTOWER_LNG),
            map: map,
            icon: { content: '<div class="home-marker">🏢 아스크타워</div>', anchor: new naver.maps.Point(55, 15) }
        });
        restaurants.forEach(rest => {
            const markerDiv = document.createElement('div');
            markerDiv.className = 'custom-marker';
            markerDiv.innerText = '📍 ' + rest.name;
            const marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(rest.lat, rest.lng),
                map: map,
                icon: { content: markerDiv, anchor: new naver.maps.Point(60, 15) }
            });
            naver.maps.Event.addListener(marker, 'click', () => openDetail(rest, markerDiv));
        });
    }

    function updateUI(data) {
        for(let i=1; i<=3; i++) {
            const val = data[`menu${i}`] || "";
            document.getElementById(`menu${i}`).value = val;
            document.getElementById(`th-menu${i}`).innerText = val || `메뉴 ${i}`;
        }
        const tbody = document.getElementById('employee-list');
        tbody.innerHTML = '';
        let counts = {1:0, 2:0, 3:0};
        employees.forEach((emp, i) => {
            const voteVal = data[`vote_${i}`] || 0;
            if(voteVal > 0) counts[voteVal]++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${emp}</td>
                <td><input type="radio" name="v_${i}" ${voteVal==1?'checked':''} onclick="sendVote(${i}, 1)"></td>
                <td><input type="radio" name="v_${i}" ${voteVal==2?'checked':''} onclick="sendVote(${i}, 2)"></td>
                <td><input type="radio" name="v_${i}" ${voteVal==3?'checked':''} onclick="sendVote(${i}, 3)"></td>
            `;
            tbody.appendChild(tr);
        });
        for(let i=1; i<=3; i++) document.getElementById(`count${i}`).innerText = `(${counts[i]}명)`;
    }

    function sendVote(empIdx, val) { db.ref('lunch_vote').update({ [`vote_${empIdx}`]: val }); }
    function syncMenus() {
        db.ref('lunch_vote').update({
            menu1: document.getElementById('menu1').value,
            menu2: document.getElementById('menu2').value,
            menu3: document.getElementById('menu3').value
        });
    }
    function resetAllData() { if(confirm("초기화할까요?")) db.ref('lunch_vote').set(null); }
    function openDetail(rest, markerEl) {
        if (activeMarkerEl) activeMarkerEl.classList.remove('active');
        activeMarkerEl = markerEl; markerEl.classList.add('active');
        document.getElementById('d-name').innerText = rest.name;
        document.getElementById('d-rating').innerText = rest.rating !== '-' ? `★ ${rest.rating}점` : '평점 정보 없음';
        document.getElementById('d-category').innerText = rest.category;
        document.getElementById('d-distance').innerText = rest.distance;
        const menuContainer = document.getElementById('d-menus');
        menuContainer.innerHTML = '';
        rest.menu.split(',').forEach(m => {
            const tag = document.createElement('span'); tag.className = 'menu-tag'; tag.innerText = m.trim();
            menuContainer.appendChild(tag);
        });
        document.getElementById('d-naver-link').href = `https://map.naver.com/p/entry/place/${rest.placeId}`;
        document.getElementById('d-menu-link').href = `https://map.naver.com/p/entry/place/${rest.placeId}/menu/list`;
        document.getElementById('detail-panel').classList.add('open');
    }
    function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }
    function copyUpdatedData() {
        const dataString = JSON.stringify(restaurants, null, 4);
        navigator.clipboard.writeText(`const restaurants = ${dataString};`).then(() => { alert("데이터 복사 완료!"); });
    }
</script>
</body>
</html>
