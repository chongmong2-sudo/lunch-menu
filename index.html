            --danger: #e74c3c;
            --bg: #F4F7F6;

            --text: #222;

            --green: #03C75A;

            --panel-width: 400px;

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }
        .left-panel { width: var(--panel-width); background: white; box-shadow: 2px 0 12px rgba(0,0,0,0.07); display: flex; flex-direction: column; z-index: 10; }

        .scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .section { padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-title { font-size: 14px; font-weight: 700; }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
        .btn-reset:hover { background: #c0392b; }

        .menu-slot { display: flex; align-items: center; margin-bottom: 7px; }
        .menu-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
        .menu-dot.m1 { background: var(--menu1c); }
        .menu-dot.m2 { background: var(--menu2c); }
        .menu-dot.m3 { background: var(--menu3c); }
        .menu-slot span { font-weight: 700; width: 44px; color: var(--primary); font-size: 13px; }
        .menu-slot select { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: #fafafa; color: var(--text); cursor: pointer; }

        .voting-table { width: 100%; border-collapse: collapse; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 6px 3px; text-align: center; font-size: 12px; }
        .voting-table th { background: #f5f5f5; font-weight: 700; }
        .th-m1 { color: var(--menu1c); }
        .th-m2 { color: var(--menu2c); }
        .th-m3 { color: var(--menu3c); }
        .vote-count { display: block; font-size: 11px; margin-top: 2px; font-weight: 700; }
        input[type="radio"] { cursor: pointer; transform: scale(1.2); }
        input[type="radio"].r1 { accent-color: var(--menu1c); }
        input[type="radio"].r2 { accent-color: var(--menu2c); }
        input[type="radio"].r3 { accent-color: var(--menu3c); }

        .detail-panel { flex-shrink: 0; background: white; border-top: 2px solid var(--primary); overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; opacity: 0; }
        .detail-panel.open { max-height: 480px; opacity: 1; }
        .detail-inner { padding: 14px 18px 16px; }
        .detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .detail-name { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; line-height: 1.3; }
        .detail-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 0 0 0 8px; }
        .detail-close:hover { color: var(--danger); }
        .detail-rating { font-size: 13px; color: #f39c12; font-weight: 700; margin-bottom: 10px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .detail-item { background: #f8f9fa; border-radius: 8px; padding: 7px 10px; }
        .detail-item-label { font-size: 10px; color: var(--text-muted); font-weight: 500; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-item-value { font-size: 12px; color: var(--text); font-weight: 500; }
        .detail-menu-section { margin-bottom: 11px; }
        .detail-menu-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

        .menu-tag { background: #EEF5FF; color: var(--primary-dark); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
        .btn-row { display: flex; gap: 8px; }

    const employees = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];

    let activeMarkerEl = null;
    let markerMap = {}; // name → markerDiv

    function calcDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
        return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function initApp() {
        initDropdowns();
        initEmployeeList();
        initMap();
    }

    function initDropdowns() {
        const selects = ['menu1','menu2','menu3'].map(id => document.getElementById(id));
        restaurants.forEach(r => {
            selects.forEach(sel => {
                const opt = document.createElement('option');
                opt.value = r.name;
                opt.text = `[${r.category}] ${r.name}`;
                sel.appendChild(opt);
            });
        });
    }

    function initEmployeeList() {
        const tbody = document.getElementById('employee-list');
        tbody.innerHTML = '';
        employees.forEach((emp, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size:12px;">${emp}</td>
                <td><input type="radio" class="r1" name="vote_${i}" value="1" onchange="countVotes()"></td>
                <td><input type="radio" class="r2" name="vote_${i}" value="2" onchange="countVotes()"></td>
                <td><input type="radio" class="r3" name="vote_${i}" value="3" onchange="countVotes()"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateTableHeaders() {
        const v1 = document.getElementById('menu1').value;
        const v2 = document.getElementById('menu2').value;
        const v3 = document.getElementById('menu3').value;
        document.getElementById('th-menu1').innerText = v1 || '메뉴 1';
        document.getElementById('th-menu2').innerText = v2 || '메뉴 2';
        document.getElementById('th-menu3').innerText = v3 || '메뉴 3';
    }

    // 선정된 메뉴 마커 강조
    function highlightMarkers() {
        const v1 = document.getElementById('menu1').value;
        const v2 = document.getElementById('menu2').value;
        const v3 = document.getElementById('menu3').value;

        // 모든 마커 기본 상태로 초기화
        Object.values(markerMap).forEach(el => {
            el.classList.remove('selected-1','selected-2','selected-3');
        });

        if (v1 && markerMap[v1]) markerMap[v1].classList.add('selected-1');
        if (v2 && markerMap[v2]) markerMap[v2].classList.add('selected-2');
        if (v3 && markerMap[v3]) markerMap[v3].classList.add('selected-3');

        // 범례 업데이트
        updateLegend(v1, v2, v3);
    }

    function updateLegend(v1, v2, v3) {
        const legend = document.getElementById('map-legend');
        const show = v1 || v2 || v3;
        legend.classList.toggle('visible', !!show);

        const l1 = document.getElementById('legend-m1');
        const l2 = document.getElementById('legend-m2');
        const l3 = document.getElementById('legend-m3');

        l1.style.display = v1 ? 'flex' : 'none';
        l2.style.display = v2 ? 'flex' : 'none';
        l3.style.display = v3 ? 'flex' : 'none';

        if (v1) document.getElementById('legend-m1-text').innerText = v1;
        if (v2) document.getElementById('legend-m2-text').innerText = v2;
        if (v3) document.getElementById('legend-m3-text').innerText = v3;
    }

    function resetMenus() {
        if (confirm("선택된 메뉴와 투표 내역을 모두 초기화하시겠습니까?")) {
            ['menu1','menu2','menu3'].forEach(id => document.getElementById(id).value = "");
            updateTableHeaders();
            initEmployeeList();
            countVotes();
            closeDetail();
            highlightMarkers();
        }
    }

    function countVotes() {
        let counts = {1:0, 2:0, 3:0};
        document.querySelectorAll('input[type="radio"]:checked').forEach(r => counts[r.value]++);
        document.getElementById('count1').innerText = `(${counts[1]}명)`;
        document.getElementById('count2').innerText = `(${counts[2]}명)`;
        document.getElementById('count3').innerText = `(${counts[3]}명)`;
    }

    function initMap() {
        const map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(ASKTOWER_LAT, ASKTOWER_LNG),
            zoom: 17
        });

        // 🏢 아스크타워 마커
        new naver.maps.Marker({
            position: new naver.maps.LatLng(ASKTOWER_LAT, ASKTOWER_LNG),
            map,
            icon: {
                content: '<div class="home-marker">🏢 아스크타워</div>',
                anchor: new naver.maps.Point(55, 15)
            },
            zIndex: 100
        });

        // 식당 마커
        restaurants.forEach(rest => {
            const position = new naver.maps.LatLng(rest.lat, rest.lng);
            const markerDiv = document.createElement('div');
            markerDiv.className = 'custom-marker';
            markerDiv.innerText = '📍 ' + rest.name;

            markerMap[rest.name] = markerDiv;

            const marker = new naver.maps.Marker({
                position, map,
                icon: { content: markerDiv, anchor: new naver.maps.Point(60, 15) }
            });

            naver.maps.Event.addListener(marker, 'click', function() {
                map.panTo(position);
                openDetail(rest, markerDiv);
            });
        });

        naver.maps.Event.addListener(map, 'click', function(e) {
            if (!e.originalEvent.target.closest('.custom-marker')) closeDetail();
        });
    }

    function openDetail(rest, markerEl) {
        if (activeMarkerEl && !activeMarkerEl.classList.contains('selected-1') &&
            !activeMarkerEl.classList.contains('selected-2') &&
            !activeMarkerEl.classList.contains('selected-3')) {
            activeMarkerEl.classList.remove('active');
        }
        activeMarkerEl = markerEl;
        if (!markerEl.classList.contains('selected-1') &&
            !markerEl.classList.contains('selected-2') &&
            !markerEl.classList.contains('selected-3')) {
            markerEl.classList.add('active');
        }

        document.getElementById('d-name').innerText = rest.name;
        document.getElementById('d-rating').innerText = rest.rating !== '-' ? `★ ${rest.rating}점` : '평점 정보 없음';
        document.getElementById('d-category').innerText = rest.category;

        const dist = calcDistance(ASKTOWER_LAT, ASKTOWER_LNG, rest.lat, rest.lng);
        document.getElementById('d-distance').innerText = `약 ${dist}m (직선)`;
        document.getElementById('d-phone').innerText = rest.phone !== '-' ? rest.phone : '정보 없음';

        const menuContainer = document.getElementById('d-menus');
        menuContainer.innerHTML = '';
        rest.menu.split(',').map(m => m.trim()).forEach(m => {
            const tag = document.createElement('span');
            tag.className = 'menu-tag';
            tag.innerText = m;
            menuContainer.appendChild(tag);
        });

        document.getElementById('d-naver-link').href = `https://map.naver.com/p/entry/place/${rest.placeId}`;
        document.getElementById('d-menu-link').href = `https://map.naver.com/p/entry/place/${rest.placeId}/menu/list`;

        const panel = document.getElementById('detail-panel');
        panel.classList.add('open');
        setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.remove('open');
        if (activeMarkerEl) {
            if (!activeMarkerEl.classList.contains('selected-1') &&
                !activeMarkerEl.classList.contains('selected-2') &&
                !activeMarkerEl.classList.contains('selected-3')) {
                activeMarkerEl.classList.remove('active');
            }
            activeMarkerEl = null;
        }
    }
</script>
