<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 점심 뭐 먹지? - 실시간 아스크타워</title>
    
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        :root { --primary: #4A90E2; --bg: #F4F7F6; --green: #03C75A; --danger: #e74c3c; --border: #E0E0E0; --panel-width: 400px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        .left-panel { width: var(--panel-width); background: white; box-shadow: 2px 0 12px rgba(0,0,0,0.07); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 16px 20px; background: var(--primary); color: white; font-size: 20px; font-weight: 700; }
        .scroll-area { flex: 1; overflow-y: auto; }
        .section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
        .menu-slot { display: flex; align-items: center; margin-bottom: 8px; }
        .menu-slot span { font-weight: 700; width: 60px; color: var(--primary); font-size: 13px; }
        .menu-slot select { flex: 1; padding: 7px; border-radius: 6px; border: 1px solid var(--border); }
        .voting-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 8px; text-align: center; }
        .vote-count { color: var(--danger); font-weight: 700; display: block; }
        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .home-marker { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="header">🍱 오늘 점심 뭐 먹지?</div>
    <div class="scroll-area">
        <div class="section">
            <div style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">1. 후보 메뉴 선정</div>
            <div class="menu-slot"><span>메뉴 1</span><select id="menu1" onchange="syncMenus()"><option value="">선택해주세요</option></select></div>
            <div class="menu-slot"><span>메뉴 2</span><select id="menu2" onchange="syncMenus()"><option value="">선택해주세요</option></select></div>
            <div class="menu-slot"><span>메뉴 3</span><select id="menu3" onchange="syncMenus()"><option value="">선택해주세요</option></select></div>
        </div>
        <div class="section">
            <div style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">2. 실시간 투표 결과</div>
            <table class="voting-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th><span id="th-menu1">메뉴1</span><span class="vote-count" id="count1">(0명)</span></th>
                        <th><span id="th-menu2">메뉴2</span><span class="vote-count" id="count2">(0명)</span></th>
                        <th><span id="th-menu3">메뉴3</span><span class="vote-count" id="count3">(0명)</span></th>
                    </tr>
                </thead>
                <tbody id="employee-list"></tbody>
            </table>
        </div>
    </div>
</div>
<div class="right-panel"><div id="map"></div></div>

<script>
    // 1. Firebase 설정 (원호님 캡처본 데이터 적용)
    const firebaseConfig = {
        apiKey: "AIzaSyAcyRvDUV67IJi3o8Z1Dl2tDHBATCN_d4Q",
        authDomain: "lunch-menu-3c36c.firebaseapp.com",
        databaseURL: "https://lunch-menu-3c36c-default-rtdb.firebaseio.com",
        projectId: "lunch-menu-3c36c",
        storageBucket: "lunch-menu-3c36c.firebasestorage.app",
        messagingSenderId: "498939490952",
        appId: "1:498939490952:web:9849dd97c3089a153a253d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const employees = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];
    const restaurants = [
        { name: "도라키치", lat: 37.4761, lng: 126.8891, category: "일식" },
        { name: "가산삼계탕", lat: 37.4775, lng: 126.8885, category: "한식" },
        { name: "양양한식뷔페", lat: 37.4755, lng: 126.8902, category: "뷔페" }
        // ... 필요한 식당 데이터를 여기에 추가하세요
    ];

    function init() {
        initDropdowns();
        renderEmployeeList();
        initMap();
        listenToFirebase();
    }

    function initDropdowns() {
        const selects = [document.getElementById('menu1'), document.getElementById('menu2'), document.getElementById('menu3')];
        restaurants.forEach(r => {
            selects.forEach(sel => {
                const opt = document.createElement('option');
                opt.value = r.name; opt.text = r.name;
                sel.appendChild(opt);
            });
        });
    }

    function renderEmployeeList() {
        const tbody = document.getElementById('employee-list');
        employees.forEach((emp, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${emp}</td>
                <td><input type="radio" name="vote_${i}" value="1" onchange="syncVotes(${i}, 1)"></td>
                <td><input type="radio" name="vote_${i}" value="2" onchange="syncVotes(${i}, 2)"></td>
                <td><input type="radio" name="vote_${i}" value="3" onchange="syncVotes(${i}, 3)"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function syncMenus() {
        db.ref('lunch/menus').set({
            m1: document.getElementById('menu1').value,
            m2: document.getElementById('menu2').value,
            m3: document.getElementById('menu3').value
        });
    }

    function syncVotes(empIdx, val) {
        db.ref('lunch/votes/' + empIdx).set(val);
    }

    function listenToFirebase() {
        db.ref('lunch').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            if(data.menus) {
                document.getElementById('menu1').value = data.menus.m1 || "";
                document.getElementById('menu2').value = data.menus.m2 || "";
                document.getElementById('menu3').value = data.menus.m3 || "";
                document.getElementById('th-menu1').innerText = data.menus.m1 || "메뉴1";
                document.getElementById('th-menu2').innerText = data.menus.m2 || "메뉴2";
                document.getElementById('th-menu3').innerText = data.menus.m3 || "메뉴3";
            }
            if(data.votes) {
                let counts = {1:0, 2:0, 3:0};
                Object.entries(data.votes).forEach(([idx, val]) => {
                    const radio = document.querySelector(`input[name="vote_${idx}"][value="${val}"]`);
                    if(radio) radio.checked = true;
                    counts[val]++;
                });
                document.getElementById('count1').innerText = `(${counts[1]}명)`;
                document.getElementById('count2').innerText = `(${counts[2]}명)`;
                document.getElementById('count3').innerText = `(${counts[3]}명)`;
            }
        });
    }

    function initMap() {
        const map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.4767424, 126.8897311),
            zoom: 17
        });
        new naver.maps.Marker({
            position: new naver.maps.LatLng(37.4767424, 126.8897311),
            map: map,
            icon: { content: '<div class="home-marker">🏢 아스크타워</div>', anchor: new naver.maps.Point(55, 15) }
        });
    }

    init();
</script>
</body>
</html>
