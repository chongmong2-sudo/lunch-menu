<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>네이버 지도 에디터 모드</title>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script>
    <style>
        #map { width: 100%; height: 500px; }
        .controls { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .edit-on { background-color: #ff4d4d; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
        .edit-off { background-color: #007bff; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <button id="edit-btn" class="edit-off" onclick="toggleEditMode()">에디터 모드 시작 (이동 불가)</button>
    <span id="status-text"> 현재: 일반 모드</span>
</div>
<div id="map"></div>

<script>
// 1. 초기 설정
let map;
let isEditMode = false;
let markers = []; // 생성된 마커들을 관리하는 배열

// 임시 마커 데이터 (나중에는 DB에서 가져와야 함)
const initialData = [
    { id: 1, lat: 37.5665, lng: 126.9780, title: "서울시청" },
    { id: 2, lat: 37.5700, lng: 126.9800, title: "지점 A" }
];

// 지도 초기화
function initMap() {
    map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 15
    });

    // 마커 생성 루프
    initialData.forEach(data => {
        let marker = new naver.maps.Marker({
            position: new naver.maps.LatLng(data.lat, data.lng),
            map: map,
            title: data.title,
            draggable: false // 초기값은 항상 false (이동 불가)
        });
        
        marker.set('id', data.id); // 마커 객체에 ID 저장
        markers.push(marker);

        // 마커 드래그가 끝났을 때 이벤트 (에디터 모드일 때만 동작하도록 로직 구성)
        naver.maps.Event.addListener(marker, 'dragend', function(e) {
            saveNewPosition(marker.get('id'), e.coord);
        });
    });
}

// 2. 에디터 모드 토글 함수
function toggleEditMode() {
    isEditMode = !isEditMode;
    const btn = document.getElementById('edit-btn');
    const status = document.getElementById('status-text');

    if (isEditMode) {
        btn.innerText = "에디터 모드 종료 (이동 가능)";
        btn.className = "edit-on";
        status.innerText = " 현재: 수정 중... 마커를 드래그하세요.";
    } else {
        btn.innerText = "에디터 모드 시작 (이동 불가)";
        btn.className = "edit-off";
        status.innerText = " 현재: 일반 모드";
    }

    // 모든 마커의 드래그 상태를 일괄 변경
    markers.forEach(marker => {
        marker.setDraggable(isEditMode);
    });
}

// 3. 서버에 좌표 저장 (실시간 반영의 핵심)
function saveNewPosition(id, coord) {
    console.log(`마커 ID ${id}가 새로운 위치로 이동함:`, coord.lat(), coord.lng());
    
    // [중요] 여기서 서버 API를 호출해야 다른 사람들에게 반영됩니다.
    /*
    fetch('/api/update-marker', {
        method: 'POST',
        body: JSON.stringify({ id: id, lat: coord.lat(), lng: coord.lng() })
    });
    */
}

initMap();
</script>
</body>
</html>
