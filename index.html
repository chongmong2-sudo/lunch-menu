            --primary-dark: #2c6fba;
            --danger: #e74c3c;
            --bg: #F4F7F6;
            --border: #E0E0E0;
            --text: #222;
            --text-muted: #888;
            --green: #03C75A;
            --panel-width: 400px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }

        /* ── 왼쪽 패널 ── */
        .left-panel {
            width: var(--panel-width);
            background: white;
            box-shadow: 2px 0 12px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .header {
            padding: 16px 20px;
            background: var(--primary);
            color: white;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        /* 스크롤 가능한 콘텐츠 영역 */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* ── 메뉴 선점 섹션 ── */
        .section {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-title { font-size: 14px; font-weight: 700; }
        .btn-reset {
            background: var(--danger);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }
        .btn-reset:hover { background: #c0392b; }
        .menu-slot { display: flex; align-items: center; margin-bottom: 8px; }
        .menu-slot span { font-weight: 700; width: 52px; color: var(--primary); font-size: 13px; }
        .menu-slot select {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            background: #fafafa;
            color: var(--text);
            cursor: pointer;
        }
        .menu-slot select:focus { outline: none; border-color: var(--primary); }

        /* ── 투표 테이블 ── */
        .voting-table { width: 100%; border-collapse: collapse; }
        .voting-table th, .voting-table td {
            border: 1px solid var(--border);
            padding: 7px 4px;
            text-align: center;
            font-size: 12px;
        }
        .voting-table th { background: #f5f5f5; font-weight: 700; }
        .vote-count { display: block; font-size: 11px; color: var(--danger); margin-top: 2px; font-weight: 700; }
        input[type="radio"] { cursor: pointer; transform: scale(1.2); accent-color: var(--primary); }

        /* ── 식당 상세 패널 ── */
        .detail-panel {
            flex-shrink: 0;
            background: white;
            border-top: 2px solid var(--primary);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
            opacity: 0;
        }
        .detail-panel.open {
            max-height: 420px;
            opacity: 1;
        }
        .detail-inner { padding: 16px 18px 18px; }
        .detail-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .detail-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            flex: 1;
        }
        .detail-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0 0 0 8px;
            line-height: 1;
        }
        .detail-close:hover { color: var(--danger); }
        .detail-rating {
            font-size: 13px;
            color: #f39c12;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 12px;
        }
        .detail-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 8px 10px;
        }
        .detail-item-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-item-value {
            font-size: 12px;
            color: var(--text);
            font-weight: 500;
        }
        .detail-menu-section { margin-bottom: 14px; }
        .detail-menu-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .menu-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .menu-tag {
            background: #EEF5FF;
            color: var(--primary-dark);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 500;
        }
        .naver-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: var(--green);
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.2s;
            font-family: inherit;
            border: none;
            cursor: pointer;
        }

        .right-panel { flex: 1; position: relative; }

        }

            background: var(--primary);
            color: white;
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(74,144,226,0.4);

    </style>
</head>

    const employees = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];

    let activeMarkerEl = null;

    function initApp() {
        initDropdowns();
        initEmployeeList();
        initMap();
    }

    function initDropdowns() {
        const selects = ['menu1','menu2','menu3'].map(id => document.getElementById(id));
        restaurants.forEach(r => {
            selects.forEach(sel => {
                const opt = document.createElement('option');
                opt.value = r.name;
                opt.text = `[${r.category}] ${r.name}`;
                sel.appendChild(opt);
            });
        });
    }

    function initEmployeeList() {
        const tbody = document.getElementById('employee-list');
        tbody.innerHTML = '';
        employees.forEach((emp, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size:12px;">${emp}</td>
                <td><input type="radio" name="vote_${i}" value="1" onchange="countVotes()"></td>
                <td><input type="radio" name="vote_${i}" value="2" onchange="countVotes()"></td>
                <td><input type="radio" name="vote_${i}" value="3" onchange="countVotes()"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateTableHeaders() {
        document.getElementById('th-menu1').innerText = document.getElementById('menu1').value || '메뉴 1';
        document.getElementById('th-menu2').innerText = document.getElementById('menu2').value || '메뉴 2';
        document.getElementById('th-menu3').innerText = document.getElementById('menu3').value || '메뉴 3';
    }

    function resetMenus() {
        if (confirm("선택된 메뉴와 투표 내역을 모두 초기화하시겠습니까?")) {
            ['menu1','menu2','menu3'].forEach(id => document.getElementById(id).value = "");
            updateTableHeaders();
            initEmployeeList();
            countVotes();
            closeDetail();
        }
    }

    function countVotes() {
        let counts = {1:0, 2:0, 3:0};
        document.querySelectorAll('input[type="radio"]:checked').forEach(r => counts[r.value]++);
        document.getElementById('count1').innerText = `(${counts[1]}명)`;
        document.getElementById('count2').innerText = `(${counts[2]}명)`;
        document.getElementById('count3').innerText = `(${counts[3]}명)`;
    }

    // 식당 상세 패널 열기
    function openDetail(rest, markerEl) {
        // 이전 활성 마커 초기화
        if (activeMarkerEl) activeMarkerEl.classList.remove('active');
        activeMarkerEl = markerEl;
        markerEl.classList.add('active');

        document.getElementById('d-name').innerText = rest.name;
        document.getElementById('d-rating').innerText = rest.rating !== '-' ? `★ ${rest.rating}점` : '평점 정보 없음';
        document.getElementById('d-category').innerText = rest.category;
        document.getElementById('d-distance').innerText = rest.distance;
        document.getElementById('d-phone').innerText = rest.phone !== '-' ? rest.phone : '정보 없음';

        // 메뉴 태그
        const menuContainer = document.getElementById('d-menus');
        menuContainer.innerHTML = '';
        rest.menu.split(',').map(m => m.trim()).forEach(m => {
            const tag = document.createElement('span');
            tag.className = 'menu-tag';
            tag.innerText = m;
            menuContainer.appendChild(tag);
        });

        // 네이버 지도 링크
        document.getElementById('d-naver-link').href =
            `https://map.naver.com/v5/search/${encodeURIComponent(rest.name)}`;

        const panel = document.getElementById('detail-panel');
        panel.classList.add('open');
        setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.remove('open');
        if (activeMarkerEl) { activeMarkerEl.classList.remove('active'); activeMarkerEl = null; }
    }

    // 지도 초기화
    function initMap() {
        const map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.481, 126.882),
            zoom: 16
        });

        restaurants.forEach(rest => {
            const position = new naver.maps.LatLng(rest.lat, rest.lng);

            const markerDiv = document.createElement('div');
            markerDiv.className = 'custom-marker';
            markerDiv.innerText = '📍 ' + rest.name;

            const marker = new naver.maps.Marker({
                position,
                map,
                icon: {
                    content: markerDiv,
                    anchor: new naver.maps.Point(60, 15)
                }
            });

            naver.maps.Event.addListener(marker, 'click', function() {
                map.panTo(position);
                openDetail(rest, markerDiv);
            });
        });

        naver.maps.Event.addListener(map, 'click', closeDetail);
    }
</script>
