<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Geocoding 테스트</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x&submodules=geocoder&callback=initApp"></script>
</head>
<body>
    <h2>Geocoding 테스트 중...</h2>
    <p id="result">결과 기다리는 중...</p>

    <script>
        function initApp() {
            const testPlaces = [
                "가산아스크타워",
                "삼교리동치미막국수 가산디지털단지",
                "명자수제돈까스 가산디지털단지",
                "궁정짬뽕 가산디지털단지"
            ];

            let html = '';

            testPlaces.forEach((place, i) => {
                setTimeout(() => {
                    naver.maps.Service.geocode({ query: place }, function(status, response) {
                        if (status === naver.maps.Service.Status.OK && response.v2.addresses.length > 0) {
                            const addr = response.v2.addresses[0];
                            html += `✅ <b>${place}</b><br>위도: ${addr.y} / 경도: ${addr.x}<br><br>`;
                        } else {
                            html += `❌ <b>${place}</b> - 실패 (${status})<br><br>`;
                        }
                        document.getElementById('result').innerHTML = html;
                    });
                }, i * 500);
            });
        }
    </script>
</body>
</html>
