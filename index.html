<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 점심 뭐 먹지? - 아스크타워 맛집지도</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=z6vojrwz9x"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 원호님의 CSS 디자인 100% 동일하게 유지 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        :root {
            --primary: #4A90E2; --primary-dark: #2c6fba; --danger: #e74c3c;
            --bg: #F4F7F6; --border: #E0E0E0; --text: #222;
            --text-muted: #888; --green: #03C75A; --panel-width: 400px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }
        .left-panel { width: var(--panel-width); background: white; box-shadow: 2px 0 12px rgba(0,0,0,0.07); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 16px 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
        .header .btn-copy { background: var(--green); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; }
        .scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .section { padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 14px; font-weight: 700; }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .menu-slot { display: flex; align-items: center; margin-bottom: 8px; }
        .menu-slot span { font-weight: 700; width: 52px; color: var(--primary); font-size: 13px; }
        .menu-slot select { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fafafa; }
        .voting-table { width: 100%; border-collapse: collapse; }
        .voting-table th, .voting-table td { border: 1px solid var(--border); padding: 7px 4px; text-align: center; font-size: 12px; }
        .voting-table th { background: #f5f5f5; font-weight: 700; }
        .vote-count { display: block; font-size: 11px; color: var(--danger); margin-top: 2px; font-weight: 700; }
        .detail-panel { flex-shrink: 0; background: white; border-top: 2px solid var(--primary); overflow: hidden; max-height: 0; transition: max-height 0.35s ease, opacity 0.3s; opacity: 0; }
        .detail-panel.open { max-height: 520px; opacity: 1; }
        .detail-inner { padding: 16px 18px 18px; }
        .right-panel { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .custom-marker { background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 4px 11px; font-size: 12px; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.15); cursor: pointer; white-space: nowrap; }
        .home-marker { background: #e74c3c; color: white; border: 2px solid #c0392b; border-radius: 20px; padding: 5px 13px; font-size: 13px; font-weight: 700; }
        .menu-tag { background: #EEF5FF; color: var(--primary-dark); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 500; margin-right: 5px; margin-bottom: 5px; display: inline-block; }
        .naver-btn { flex: 1; display: block; padding: 10px; background: var(--green); color: white; text-align: center; border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="header">
        <span>🍱 오늘 점심 뭐 먹지?</span>
        <button class="btn-copy" onclick="copyUpdatedData()">💾 위치 데이터 복사</button>
    </div>
    <div class="scroll-area">
        <div class="section">
            <div class="section-header">
                <div class="section-title">1. 선착순 메뉴 3개 선점</div>
                <button class="btn-reset" onclick="resetAllData()">↻ 전체 초기화</button>
            </div>
            <div class="menu-slot"><span>메뉴 1</span><select id="menu1" onchange="syncMenus()"><option value="">선택해주세요</option></select></div>
            <div class="menu-slot"><span>메뉴 2</span><select id="menu2" onchange="syncMenus()"><option value="">선택해주세요</option></select></div>
            <div class="menu-slot"><span>메뉴 3</span><select id="menu3" onchange="syncMenus()"><option value="">선택해주세요</option></select></div>
        </div>
        <div class="section" style="flex:1;">
            <div class="section-header"><div class="section-title">2. 메뉴 선택 (투표)</div></div>
            <table class="voting-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th><span id="th-menu1">메뉴 1</span><span class="vote-count" id="count1">(0명)</span></th>
                        <th><span id="th-menu2">메뉴 2</span><span class="vote-count" id="count2">(0명)</span></th>
                        <th><span id="th-menu3">메뉴 3</span><span class="vote-count" id="count3">(0명)</span></th>
                    </tr>
                </thead>
                <tbody id="employee-list"></tbody>
            </table>
        </div>
        <div class="detail-panel" id="detail-panel">
            <div class="detail-inner" id="detail-content">
                </div>
        </div>
    </div>
</div>
<div class="right-panel"><div id="map"></div></div>

<script>
    // 1. Firebase 설정 (원호님의 실제 Firebase 정보로 교체하세요)
    const firebaseConfig = {
        apiKey: "AIza...",
        databaseURL: "https://your-project.firebaseio.com",
        projectId: "your-project-id"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. 데이터 및 초기 설정
    const ASKTOWER_LAT = 37.4767424, ASKTOWER_LNG = 126.8897311;
    let restaurants = [ /* ... 위에 주신 51개 데이터 그대로 삽입 ... */ ];
    const employees = ["김미연", "김혁중", "류한식", "박윤영", "송원호", "신윤철", "안서형", "우성욱", "이홍비", "임호준", "장현진"];

    // 3. 실시간 동기화 (Firebase -> UI)
    db.ref('lunch_vote').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        updateUI(data);
    });

    function updateUI(data) {
        // 메뉴 드롭다운 & 헤더 업데이트
        for(let i=1; i<=3; i++) {
            const val = data[`menu${i}`] || "";
            document.getElementById(`menu${i}`).value = val;
            document.getElementById(`th-menu${i}`).innerText = val || `메뉴 ${i}`;
        }
        
        // 투표 테이블 생성
        const tbody = document.getElementById('employee-list');
        tbody.innerHTML = '';
        let counts = {1:0, 2:0, 3:0};

        employees.forEach((emp, i) => {
            const voteVal = data[`vote_${i}`] || 0;
            if(voteVal > 0) counts[voteVal]++;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${emp}</td>
                <td><input type="radio" name="v_${i}" ${voteVal==1?'checked':''} onclick="sendVote(${i}, 1)"></td>
                <td><input type="radio" name="v_${i}" ${voteVal==2?'checked':''} onclick="sendVote(${i}, 2)"></td>
                <td><input type="radio" name="v_${i}" ${voteVal==3?'checked':''} onclick="sendVote(${i}, 3)"></td>
            `;
            tbody.appendChild(tr);
        });

        // 투표수 업데이트
        for(let i=1; i<=3; i++) document.getElementById(`count${i}`).innerText = `(${counts[i]}명)`;
    }

    // 4. 데이터 전송 (UI -> Firebase)
    function syncMenus() {
        db.ref('lunch_vote').update({
            menu1: document.getElementById('menu1').value,
            menu2: document.getElementById('menu2').value,
            menu3: document.getElementById('menu3').value
        });
    }

    function sendVote(empIdx, val) {
        db.ref('lunch_vote').update({ [`vote_${empIdx}`]: val });
    }

    function resetAllData() {
        if(confirm("정말 초기화할까요?")) db.ref('lunch_vote').set(null);
    }

    // 5. 지도 및 상세페이지 로직 (원호님 원본 함수들 유지)
    // ... initMap(), openDetail() 등 원본 함수들을 여기에 그대로 붙여넣으시면 됩니다.
</script>
</body>
</html>
